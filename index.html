<!DOCTYPE html>
<html lang="zh-CN">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        ink: '#1a1a1a', 
                        vermilion: '#962f23', 
                        parchment: '#fbfaf8', 
                        gold: '#c19a6b' 
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Serif SC', serif; background-color: #fbfaf8; color: #1a1a1a; line-height: 1.5; overflow-x: hidden; }

        #poster-container { width: 375px; position: absolute; left: -9999px; background: white; }
        .chart-wrap { position: relative; height: 260px; width: 100%; margin: 0 auto; }

<body class="flex flex-col items-center min-h-screen">

    <div id="start-page" class="max-w-2xl w-full text-center space-y-8 py-16 px-6 flex flex-col justify-center min-h-screen">

            <div class="h-px w-24 bg-gold opacity-30"></div>

        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 max-w-lg mx-auto w-full">
            <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">

                <p class="text-xl font-black text-ink">18 道</p>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">

            </div>
            <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                <p class="text-[10px] text-gray-400 uppercase font-bold mb-1">核心维度</p>
                <p class="text-xl font-black text-ink">6 维</p>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                <p class="text-[10px] text-gray-400 uppercase font-bold mb-1">预计耗时</p>
                <p class="text-xl font-black text-ink">3 分钟</p>
            </div>
        </div>

        <div class="space-y-8 flex flex-col items-center pt-4">
            <h2 class="text-2xl md:text-3xl font-black text-ink tracking-[0.15em]">寻 找 你 的 江 湖 原 型</h2>
            <div class="w-full max-w-[340px] space-y-6">
                <p class="text-[12px] font-bold text-vermilion tracking-[0.4em] uppercase opacity-70">—— 请选择你的江湖性别 ——</p>
                <div class="grid grid-cols-2 gap-4 w-full">
                    <button onclick="selectGender('M')" class="py-5 bg-ink text-white rounded-2xl font-bold hover:bg-vermilion shadow-lg active:scale-95 transition text-lg">男 侠</button>
                    <button onclick="selectGender('F')" class="py-5 bg-ink text-white rounded-2xl font-bold hover:bg-vermilion shadow-lg active:scale-95 transition text-lg">女 侠</button>
                </div>
            </div>
        </div>
    </div>

    <div id="quiz-page" class="max-w-xl w-full py-12 px-6">

            <div class="flex flex-col items-center">
                <span class="text-[10px] font-bold text-gold/50 tracking-widest uppercase">Progress</span>
                <span class="text-sm font-black text-gold tracking-widest" id="q-count">01 / 18</span>
            </div>
            <div class="w-10"></div> 
        </div>
        <div class="space-y-12">

            <div id="options" class="space-y-4"></div>
        </div>
    </div>

            <div class="lg:col-span-7 space-y-6">

                            <p id="role-desc-long" class="text-gray-700 text-sm md:text-base leading-relaxed text-justify"></p>
                        </div>
                        <div id="detailed-traits" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-lg border border-gray-50">
                    <h3 class="text-lg font-black text-ink mb-6 flex items-center gap-2">
                        <span class="w-2 h-6 bg-gold rounded-full"></span>
                        近似人格原型
                    </h3>
                    <div id="similar-roles" class="space-y-4"></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-ink p-6 rounded-3xl text-center text-white">
                        <span class="text-[10px] opacity-50 block mb-2 font-bold uppercase tracking-widest">灵魂伴侣</span>
                        <span id="role-mate" class="text-lg font-black text-gold"></span>
                    </div>
                    <div class="bg-white p-6 rounded-3xl text-center border border-gray-100 shadow-sm">

                        <span id="role-enemy" class="text-lg font-black text-vermilion"></span>

    <div id="poster-overlay">

            }

        function showResult() {

            window.scrollTo(0,0);

            const genderRoles = roles.filter(r => r.g === selectedGender);

                let diff = 0;
                for(let key in role.scores) {
                    diff += Math.pow((userScore[key] || 0) - role.scores[key], 2);
                }
                return { ...role, diff };
            }).sort((a, b) => a.diff - b.diff);

            const bestMatch = results[0];
            const similarOnes = results.slice(1, 4);

            document.getElementById('role-name').innerText = bestMatch.name;

            document.getElementById('role-icon').innerText = bestMatch.icon;

            const topTrait = Object.keys(userScore).reduce((a, b) => userScore[a] > userScore[b] ? a : b);

            document.getElementById('p-rarity').innerText = document.getElementById('role-rarity').innerText;
            document.getElementById('p-desc').innerText = document.getElementById('role-desc-long').innerText;
            document.getElementById('p-icon').innerText = document.getElementById('role-icon').innerText;

            setTimeout(() => {
                html2canvas(document.getElementById('poster-container'), { 
                    scale: 3, useCORS: true, width: 375, windowWidth: 375 
                }).then(canvas => {
                    const img = new Image();
                    img.src = canvas.toDataURL('image/png');
                    container.innerHTML = '';
                    container.appendChild(img);
                });
            }, 600);
        }

        function closePoster() {
            document.getElementById('poster-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
