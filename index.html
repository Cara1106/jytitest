 <div id="start-page" class="max-w-2xl w-full text-center space-y-8 py-16 px-6 flex flex-col justify-center min-h-screen">

                btn.innerText = opt.t;
                btn.onclick = () => next(opt.s);
                optionsDiv.appendChild(btn);
            });
        }

        function next(score) {
            scoreHistory.push(JSON.parse(JSON.stringify(userScore)));
            for(let key in score) userScore[key] += score[key];
            currentQ++;
            if(currentQ < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function prev() {
            if(currentQ > 0) {
                currentQ--;
                userScore = scoreHistory.pop();
                showQuestion();
            }
        }

        function initRadar(canvasId, dataValues) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            return new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ["侠", "谋", "执", "情", "狂", "隐"],
                    datasets: [{
                        data: dataValues,
                        backgroundColor: 'rgba(150, 47, 35, 0.15)',
                        borderColor: '#962f23',
                        borderWidth: 2,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            min: 0,
                            max: 60,
                            ticks: { display: false, stepSize: 20 },
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            pointLabels: { font: { size: 12, weight: 'bold' }, color: '#1a1a1a' }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function showResult() {
            document.getElementById('quiz-page').style.display = 'none';
            document.getElementById('result-page').classList.remove('hidden');
            window.scrollTo(0,0);

            const genderRoles = roles.filter(r => r.g === selectedGender);
            let bestMatch = genderRoles[0];
            let minDiff = Infinity;
            
            genderRoles.forEach(role => {
                let diff = 0;
                for(let key in role.scores) {
                    diff += Math.pow((userScore[key] || 0) - role.scores[key], 2);
                }
                if(diff < minDiff) { minDiff = diff; bestMatch = role; }
            });

            // 填充基础信息
            const fields = ['name', 'tag', 'rarity', 'mate', 'enemy'];
            fields.forEach(f => {
                document.getElementById('role-' + f).innerText = bestMatch[f];
                document.getElementById('p-' + f).innerText = bestMatch[f];
            });

            // 填充图片
            document.getElementById('role-img-display').src = bestMatch.img;
            document.getElementById('p-img-display').src = bestMatch.img;

            // 逻辑：获取最高分维度
            const topTraitKey = Object.keys(userScore).reduce((a, b) => userScore[a] > userScore[b] ? a : b);
            const topTrait = traitInfo[topTraitKey];

            // 填充文案模块
            document.getElementById('role-mantra').innerText = topTrait.mantra;
            document.getElementById('role-desc').innerText = `你在现代生活中展现出的${bestMatch.tag}特质，与${bestMatch.name}的灵魂高度契合。${topTrait.detail}`;
            document.getElementById('role-advice').innerText = topTrait.advice;
            
            // 同步到海报文案
            document.getElementById('p-desc').innerText = `【${topTrait.mantra}】 ${topTrait.detail}`;

            const userValues = [userScore.X, userScore.M, userScore.Z, userScore.Q, userScore.K, userScore.Y];
            if(radarChart) radarChart.destroy();
            radarChart = initRadar('radarChart', userValues);
            if(radarChartPoster) radarChartPoster.destroy();
            radarChartPoster = initRadar('radarChartPoster', userValues);
        }

        function generatePoster() {
            const overlay = document.getElementById('poster-overlay');
            overlay.style.display = 'flex';
            const container = document.getElementById('poster-img-container');
            container.innerHTML = '<p class="text-white text-xs tracking-widest">正在为您手绘江湖真意...</p>';

            setTimeout(() => {
                html2canvas(document.getElementById('poster-container'), { 
                    scale: 3, useCORS: true, width: 375, windowWidth: 375 
                }).then(canvas => {
                    const img = new Image();
                    img.src = canvas.toDataURL('image/png');
                    container.innerHTML = '';
                    container.appendChild(img);
                });
            }, 600);
        }

        function closePoster() {
            document.getElementById('poster-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
